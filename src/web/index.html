<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Model Manager</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'><path d='M4.5 19.5V6.5L12 13.5 19.5 6.5V19.5' stroke='%23888' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/><circle cx='4.5' cy='6.5' r='2.2' fill='%23888'/><circle cx='19.5' cy='6.5' r='2.2' fill='%23888'/></svg>">
<style>
  :root {
    --paper:#f4f3ef; --surface:#fbfaf7; --ink:#17150f; --muted:#6c685e; --faint:#9a958a;
    --line:#e3e0d7; --line2:#d3cfc3;
    --run:#2f7d4f; --warn:#9a7216; --oom:#b23a34;
    --runbg:#e9f2ec; --warnbg:#f5eeda; --oombg:#f6e6e3;
    --r:3px; --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper:#151410; --surface:#1b1a15; --ink:#ece9df; --muted:#a49f90; --faint:#6f6a5d;
      --line:#2a271f; --line2:#3a362c;
      --run:#5fbf85; --warn:#d0a34a; --oom:#e2726b;
      --runbg:#182219; --warnbg:#221d10; --oombg:#241512;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font: 14.5px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .wrap { max-width: 940px; margin: 0 auto; padding: 0 24px; }
  a { color: var(--ink); text-underline-offset: 2px; }

  /* header */
  header { border-bottom: 1px solid var(--ink); background: var(--paper); position: sticky; top: 0; z-index: 10; }
  .bar { display: flex; align-items: center; gap: 14px; height: 60px; }
  .mark { width: 22px; height: 22px; color: var(--ink); display: block; flex: none; }
  .name { font-weight: 700; font-size: 15px; letter-spacing: -.2px; }
  .ver { font-size: 11px; color: var(--faint); letter-spacing: .3px; }
  .grow { flex: 1; }

  button { font: inherit; cursor: pointer; border: 1px solid var(--line2); background: transparent;
    color: var(--ink); padding: 6px 12px; border-radius: var(--r); transition: .12s; }
  button:hover { border-color: var(--ink); }
  button.solid { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 600; }
  button.solid:hover { opacity: .85; }
  button.link { border: none; padding: 6px 8px; color: var(--muted); }
  button.link:hover { color: var(--ink); background: transparent; text-decoration: underline; }
  button.link.warn { color: var(--oom); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .icon { border: none; background: transparent; color: var(--muted); padding: 6px; font-size: 15px; }
  .icon:hover { color: var(--ink); }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); }

  /* memory strip */
  .mem { padding: 26px 0 20px; border-bottom: 1px solid var(--line); }
  .mem .row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .mem .read { font-size: 15px; }
  .mem .read b { font-weight: 700; }
  .track { height: 8px; background: var(--line); border-radius: 2px; overflow: hidden; }
  .track .fill { height: 100%; background: var(--ink); border-radius: 2px; transition: width .5s cubic-bezier(.2,.7,.2,1); }
  .track .fill.warn { background: var(--warn); } .track .fill.hot { background: var(--oom); }
  .stats { display: flex; gap: 22px; margin-top: 11px; font-size: 12.5px; color: var(--muted); flex-wrap: wrap; }
  .stats b { color: var(--ink); font-weight: 600; }
  .stats .st { display: flex; gap: 6px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; background: var(--faint); }
  .dot.ok { background: var(--run); } .dot.bad { background: var(--oom); }

  /* model list */
  .listhead { display: flex; align-items: baseline; gap: 10px; margin: 26px 0 2px; }
  .listhead .ct { font-size: 12px; color: var(--faint); }
  .list { border-top: 1px solid var(--line); }
  .item { border-bottom: 1px solid var(--line); padding: 18px 2px; display: grid;
    grid-template-columns: 1fr auto; gap: 8px 18px; align-items: start; }
  .item .lead { min-width: 0; }
  .item .nm { font-size: 15.5px; font-weight: 650; letter-spacing: -.2px; display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .eng { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--line2); padding: 1px 6px; border-radius: 2px; }
  .sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
  .sub .mono { color: var(--ink); }
  .desc { font-size: 12.5px; color: var(--faint); margin-top: 3px; }
  .status { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; }
  .status.run { color: var(--run); } .status.load { color: var(--warn); }
  .status.stop { color: var(--faint); } .status.oom { color: var(--oom); }
  .status .dot { width: 7px; height: 7px; }
  .status.run .dot { background: var(--run); } .status.load .dot { background: var(--warn); }
  .status.oom .dot { background: var(--oom); }
  .rt { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
  .memnum { font-size: 15px; font-weight: 700; }
  .memnum .u { font-size: 11px; color: var(--faint); font-weight: 500; margin-left: 3px; }
  .memnum .tag { font-size: 9.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    color: var(--faint); margin-left: 7px; }
  .memnum .tag.meas { color: var(--run); }
  .fitline { font-size: 11.5px; margin-top: 1px; }
  .fitline.oom { color: var(--oom); } .fitline.ok { color: var(--muted); }
  .loadwrap { margin-top: 9px; max-width: 340px; }
  .loadbar { height: 5px; background: var(--line); border-radius: 2px; overflow: hidden; }
  .loadfill { height: 100%; background: var(--warn); border-radius: 2px; transition: width .6s cubic-bezier(.2,.7,.2,1); }
  .loadtxt { font-size: 11.5px; color: var(--warn); margin-top: 5px; font-weight: 600; }
  .acts { display: flex; gap: 2px; align-items: center; margin-top: 4px; }
  .boot { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; padding: 6px 8px; }
  .boot input { appearance: none; width: 30px; height: 16px; background: var(--line); border: 1px solid var(--line2);
    border-radius: 3px; position: relative; cursor: pointer; transition: .15s; }
  .boot input:checked { background: var(--ink); border-color: var(--ink); }
  .boot input::after { content:""; position: absolute; width: 12px; height: 12px; background: var(--paper);
    top: 1px; left: 1px; border-radius: 2px; transition: .15s; }
  .boot input:checked::after { left: 15px; }

  .empty { padding: 60px 10px; text-align: center; color: var(--muted); }
  .footer { margin: 34px 0 40px; display: flex; justify-content: flex-end; }
  .footer .link { font-size: 12px; color: var(--faint); }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(20,18,12,.4); display: none;
    align-items: center; justify-content: center; z-index: 50; padding: 18px; }
  .overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--ink); border-radius: var(--r);
    width: 100%; max-width: 540px; max-height: 92vh; overflow: auto; }
  .modal h3 { margin: 0; padding: 16px 20px; border-bottom: 1px solid var(--line); font-size: 15px; }
  .modal .body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
  .modal .foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; }
  label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 6px; }
  input[type=text], input[type=number], textarea, select {
    font: inherit; background: var(--paper); color: var(--ink); border: 1px solid var(--line2);
    border-radius: var(--r); padding: 8px 10px; width: 100%; }
  .mono-in { font-family: var(--mono); font-size: 13px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--ink); }
  textarea { resize: vertical; min-height: 60px; font-family: var(--mono); font-size: 12.5px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .hint { font-size: 11px; color: var(--faint); font-weight: 400; }
  .seg { display: flex; border: 1px solid var(--line2); border-radius: var(--r); overflow: hidden; width: max-content; }
  .seg button { border: none; border-radius: 0; padding: 7px 16px; color: var(--muted); }
  .seg button + button { border-left: 1px solid var(--line2); }
  .seg button.sel { background: var(--ink); color: var(--paper); }
  pre.logs { background: #100f0a; color: #d8d2c2; padding: 14px; border-radius: var(--r); max-height: 56vh;
    overflow: auto; font-size: 12px; white-space: pre-wrap; font-family: var(--mono); }
  #toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(14px);
    background: var(--ink); color: var(--paper); padding: 11px 16px; border-radius: var(--r);
    opacity: 0; pointer-events: none; transition: .2s; z-index: 60; font-size: 13.5px; max-width: 90vw; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.err { background: var(--oom); }
  @media (max-width: 560px){ .item{grid-template-columns:1fr} .rt{align-items:flex-start} .row2{grid-template-columns:1fr} }
</style>

<header><div class="wrap bar">
  <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M4.5 19.5 V6.5 L12 13.5 L19.5 6.5 V19.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="4.5" cy="6.5" r="2.1" fill="currentColor"/>
    <circle cx="19.5" cy="6.5" r="2.1" fill="currentColor"/>
  </svg>
  <span class="name">Model Manager</span>
  <span class="ver mono" id="host"></span>
  <span class="grow"></span>
  <button class="solid" id="addBtn">Add model</button>
</div></header>

<div class="wrap">
  <div class="mem">
    <div class="row"><span class="lbl">Memory</span>
      <span class="read mono"><b id="memUsed">—</b> <span style="color:var(--faint)">/ <span id="memTotal">—</span> GB</span></span></div>
    <div class="track"><div class="fill" id="memFill"></div></div>
    <div class="stats">
      <span class="st"><span class="lbl">avail</span> <b class="mono" id="sAvail">—</b></span>
      <span class="st"><span class="lbl">swap</span> <b class="mono" id="sSwap">—</b></span>
      <span class="st"><span class="lbl">docker</span> <span class="dot" id="sDot"></span> <b id="sDocker">—</b></span>
    </div>
  </div>

  <div class="listhead"><span class="lbl">Models</span><span class="ct mono" id="count"></span></div>
  <div class="list" id="list"></div>
  <div class="footer"><button class="link" id="logoutBtn">Forget token</button></div>
</div>

<!-- Add/Edit -->
<div class="overlay" id="editOverlay"><div class="modal">
  <h3 id="editTitle">Add model</h3>
  <div class="body">
    <label>Engine
      <div class="seg" id="engSel"><button type="button" data-eng="llamacpp" class="sel">llama.cpp</button><button type="button" data-eng="vllm">vLLM</button></div></label>
    <label>Name <span class="hint">— the model id API clients use</span>
      <input type="text" id="f_name" class="mono-in" placeholder="MiniMax-M2.7-UD-IQ4_XS"></label>
    <label>Description <input type="text" id="f_desc" placeholder="optional"></label>
    <label id="lbl_path">Model path <span class="hint" id="pathHint"></span>
      <input type="text" id="f_path" class="mono-in" placeholder="/models/.../model-00001-of-00004.gguf"></label>
    <label>Docker image <span class="hint" id="imgHint"></span>
      <input type="text" id="f_image" class="mono-in" placeholder="minimax-m27-longctx-108k"></label>
    <div class="row2">
      <label>Host port <input type="number" id="f_port" class="mono-in" value="18080"></label>
      <label>Context <input type="number" id="f_ctx" class="mono-in" value="8192"></label>
    </div>
    <div class="row2" id="llamaFields">
      <label>GPU layers <input type="number" id="f_ngl" class="mono-in" value="99"></label>
      <label>Threads <input type="number" id="f_threads" class="mono-in" value="20"></label>
    </div>
    <label id="kvField">KV cache type
      <select id="f_kv"><option>f16</option><option>bf16</option><option>q8_0</option><option>q5_1</option><option>q5_0</option><option>q4_1</option><option>q4_0</option><option>f32</option></select></label>
    <label id="vllmField" style="display:none">GPU memory utilization <span class="hint">0–1</span>
      <input type="number" id="f_gpu" class="mono-in" value="0.90" step="0.05" min="0.1" max="1"></label>
    <label>Extra flags <span class="hint">— one token per line</span>
      <textarea id="f_extra" placeholder="--jinja&#10;-fa&#10;on"></textarea></label>
    <label>Environment variables <span class="hint">— KEY=VALUE per line</span>
      <textarea id="f_env" placeholder="MODEL_PATH=/model&#10;GPU_MEMORY_UTILIZATION=0.8"></textarea></label>
    <label>Extra mounts <span class="hint">— host:container[:ro] per line</span>
      <textarea id="f_mounts" placeholder="/home/you/.cache/huggingface:/root/.cache/huggingface"></textarea></label>
    <label class="boot" style="margin:0"><input type="checkbox" id="f_entry"> Image provides its own entrypoint (configured via env vars)</label>
    <label class="boot" style="margin:0"><input type="checkbox" id="f_auto"> Start on boot</label>
  </div>
  <div class="foot"><button id="editCancel">Cancel</button><button class="solid" id="editSave">Save</button></div>
</div></div>

<div class="overlay" id="confirmOverlay"><div class="modal" style="max-width:460px">
  <h3 id="confirmTitle">Confirm</h3><div class="body"><div id="confirmMsg"></div></div>
  <div class="foot"><button id="confirmCancel">Cancel</button><button class="solid" id="confirmOk">Confirm</button></div>
</div></div>

<div class="overlay" id="tokenOverlay"><div class="modal" style="max-width:440px">
  <h3>Access token</h3>
  <div class="body"><p style="margin:0;color:var(--muted)">This dashboard controls models on this machine. Enter the token from the server terminal.</p>
    <label>Token <input type="password" id="tokenInput" class="mono-in" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="paste token"></label></div>
  <div class="foot"><button class="solid" id="tokenSave">Connect</button></div>
</div></div>

<div class="overlay" id="logsOverlay"><div class="modal" style="max-width:840px">
  <h3 id="logsTitle">Logs</h3><div class="body"><pre class="logs" id="logsBody">loading…</pre></div>
  <div class="foot"><button id="logsClose">Close</button></div>
</div></div>

<div id="toast"></div>

<script>
const $=(id)=>document.getElementById(id);
let TOKEN=localStorage.getItem('mm_token')||(new URLSearchParams(location.search).get('token')||'');
if(TOKEN) localStorage.setItem('mm_token',TOKEN);
let editing=null, curEngine='llamacpp';
const ENGINE={llamacpp:'llama.cpp',vllm:'vLLM'};
function toast(m,k){const t=$('toast');t.textContent=m;t.className='show '+(k||'');clearTimeout(t._t);t._t=setTimeout(()=>t.className=t.className.replace('show','').trim(),3600);}
function gb(m){return (m/1024).toFixed(1);}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
async function api(p,o={}){o.headers=Object.assign({'Authorization':'Bearer '+TOKEN},o.headers||{});
  if(o.body&&typeof o.body!=='string'){o.headers['Content-Type']='application/json';o.body=JSON.stringify(o.body);}
  const r=await fetch(p,o);let d=null;try{d=await r.json();}catch(e){}
  if(r.status===401){showToken();throw{status:401,d};} if(!r.ok)throw{status:r.status,data:d};return d;}
function showToken(){$('tokenOverlay').classList.add('show');}
$('tokenSave').onclick=()=>{TOKEN=$('tokenInput').value.trim();localStorage.setItem('mm_token',TOKEN);$('tokenOverlay').classList.remove('show');refresh();};
$('logoutBtn').onclick=()=>{localStorage.removeItem('mm_token');TOKEN='';showToken();};

function statusEl(m){
  if(m.running&&m.healthy) return '<span class="status run"><span class="dot"></span>Running</span>';
  if(m.running) return '<span class="status load"><span class="dot"></span>Loading</span>';
  if(m.oom.would_oom) return '<span class="status oom"><span class="dot"></span>Won\'t fit</span>';
  return '<span class="status stop"><span class="dot"></span>Stopped</span>';
}
function item(m){
  const d=m.def,e=m.estimate,eng=d.engine||'llamacpp';
  const tag=e.measured?'<span class="tag meas">measured</span>':'<span class="tag">est</span>';
  const apiLink=m.healthy?` · <a href="http://${location.hostname}:${d.host_port}/v1/models" target="_blank" rel="noopener">api ↗</a>`:'';
  const fit=(!m.running&&m.oom.would_oom)
    ? `<div class="fitline oom">needs ${gb(m.oom.needed_mib)}, ${gb(m.oom.available_mib)} free</div>`
    : (!m.running?`<div class="fitline ok">${gb(m.oom.headroom_mib)} GB headroom</div>`:'');
  // live load progress (running but not yet answering /health)
  const loading = (m.running && !m.healthy && m.phase) ? `
    <div class="loadwrap">
      <div class="loadbar"><div class="loadfill" style="width:${m.load_pct||3}%"></div></div>
      <div class="loadtxt">${esc(m.phase)}${m.load_pct!=null?` · ${m.load_pct}%`:''}</div>
    </div>` : '';
  const el=document.createElement('div');el.className='item';
  el.innerHTML=`
    <div class="lead">
      <div class="nm">${esc(d.name)} <span class="eng">${ENGINE[eng]||eng}</span> ${statusEl(m)}</div>
      <div class="sub"><span class="mono">:${d.host_port}</span> · <span class="mono">${(+d.context).toLocaleString()}</span> ctx${eng==='llamacpp'?` · kv ${esc(d.kv_type)}`:''}${apiLink}</div>
      ${d.description?`<div class="desc">${esc(d.description)}</div>`:''}
      ${loading}
      <div class="acts">
        ${m.running?`<button class="link warn" data-a="unload">Unload</button>`:`<button class="link" data-a="load"><b>Load</b></button>`}
        <button class="link" data-a="logs">Logs</button>
        <button class="link" data-a="edit">Edit</button>
        <button class="link" data-a="del">Delete</button>
        <label class="boot" title="Start on boot"><input type="checkbox" data-a="auto" ${d.autostart?'checked':''}> boot</label>
      </div>
    </div>
    <div class="rt">
      <div class="memnum mono">${gb(e.total_mib)}<span class="u">GB</span>${tag}</div>
      ${fit}
    </div>`;
  el.querySelector('[data-a=load]')?.addEventListener('click',()=>loadModel(m));
  el.querySelector('[data-a=unload]')?.addEventListener('click',()=>unloadModel(d.name));
  el.querySelector('[data-a=logs]').addEventListener('click',()=>showLogs(d.name));
  el.querySelector('[data-a=edit]').addEventListener('click',()=>openEdit(d));
  el.querySelector('[data-a=del]').addEventListener('click',()=>delModel(d.name));
  el.querySelector('[data-a=auto]').addEventListener('change',ev=>setAuto(d.name,ev.target.checked));
  return el;
}
async function refresh(){
  if(!TOKEN){showToken();return;}
  let st;try{st=await api('/api/state');}catch(e){if(e.status!==401)toast('Connection lost — retrying','err');return;}
  const mem=st.memory,pct=Math.min(100,Math.round(mem.used_mib*100/mem.total_mib));
  const f=$('memFill');f.style.width=pct+'%';f.className='fill'+(pct>=90?' hot':pct>=78?' warn':'');
  $('memUsed').textContent=gb(mem.used_mib);$('memTotal').textContent=gb(mem.total_mib);
  $('sAvail').textContent=gb(mem.available_mib)+' GB';
  $('sSwap').textContent=gb(mem.swap_used_mib)+' / '+gb(mem.swap_total_mib)+' GB';
  $('sDocker').textContent=st.docker_ok?'ok':'down';$('sDot').className='dot '+(st.docker_ok?'ok':'bad');
  $('count').textContent=st.models.length?st.models.length:'';
  const L=$('list');L.innerHTML='';
  if(!st.models.length){L.innerHTML='<div class="empty">No models yet — click <b>Add model</b> to register a GGUF or HuggingFace model.</div>';return;}
  st.models.forEach(m=>L.appendChild(item(m)));
}
function loadModel(m){
  if(m.oom.would_oom){confirmDialog('Memory warning',
    `<p><b>${esc(m.def.name)}</b> needs ~<b>${gb(m.oom.needed_mib)} GB</b> but only <b>${gb(m.oom.available_mib)} GB</b> is free.</p>
     <p style="color:var(--oom)">Loading will very likely OOM. Free memory first, or load anyway.</p>`,'Load anyway',()=>doLoad(m.def.name,true));
  } else doLoad(m.def.name,false);
}
async function doLoad(n,f){try{toast('Starting '+n+'…');await api(`/api/models/${encodeURIComponent(n)}/load?force=${f}`,{method:'POST'});setTimeout(refresh,700);}
  catch(e){if(e.status===409&&e.data){confirmDialog('Memory warning',`<p>${esc(e.data.message||'Would OOM')}</p>`,'Load anyway',()=>doLoad(n,true));}else toast('Load failed: '+(e.data?.error||e.status),'err');}}
function unloadModel(n){confirmDialog('Unload','<p>Stop and remove the container for <b>'+esc(n)+'</b>?</p>','Unload',async()=>{
  try{await api(`/api/models/${encodeURIComponent(n)}/unload`,{method:'POST'});toast(n+' unloaded');refresh();}catch(e){toast('Unload failed','err');}});}
async function setAuto(n,en){try{await api(`/api/models/${encodeURIComponent(n)}/autostart`,{method:'POST',body:{enabled:en}});toast('Boot '+(en?'on':'off'));refresh();}catch(e){toast('Failed','err');refresh();}}
function delModel(n){confirmDialog('Delete','<p>Remove <b>'+esc(n)+'</b>? (Unloads if running; files not deleted.)</p>','Delete',async()=>{
  try{await api(`/api/models/${encodeURIComponent(n)}`,{method:'DELETE'});toast(n+' removed');refresh();}catch(e){toast('Delete failed','err');}});}
async function showLogs(n){$('logsTitle').textContent='Logs · '+n;$('logsBody').textContent='loading…';$('logsOverlay').classList.add('show');
  try{const d=await api(`/api/models/${encodeURIComponent(n)}/logs`);$('logsBody').textContent=d.logs||'(no logs)';const b=$('logsBody');b.scrollTop=b.scrollHeight;}catch(e){$('logsBody').textContent='Error';}}
$('logsClose').onclick=()=>$('logsOverlay').classList.remove('show');

function setEngine(e){curEngine=e;$('engSel').querySelectorAll('button').forEach(b=>b.classList.toggle('sel',b.dataset.eng===e));
  const v=e==='vllm';$('llamaFields').style.display=v?'none':'grid';$('kvField').style.display=v?'none':'flex';$('vllmField').style.display=v?'flex':'none';
  $('pathHint').textContent=v?'— HuggingFace model directory':'— first GGUF shard';
  $('imgHint').textContent=v?'— blank = vllm/vllm-openai:latest':'— your llama-server image';
  $('f_path').placeholder=v?'/models/Qwen2.5-72B-Instruct':'/models/.../model-00001-of-00004.gguf';}
$('engSel').querySelectorAll('button').forEach(b=>b.onclick=()=>setEngine(b.dataset.eng));
function openEdit(d){editing=d?d.name:null;$('editTitle').textContent=d?'Edit model':'Add model';setEngine(d?.engine||'llamacpp');
  $('f_name').value=d?.name||'';$('f_name').disabled=!!d;$('f_desc').value=d?.description||'';$('f_path').value=d?.model_path||'';
  $('f_image').value=d?.image||'';$('f_port').value=d?.host_port??18080;$('f_ctx').value=d?.context??8192;
  $('f_ngl').value=d?.ngl??99;$('f_threads').value=d?.threads??20;$('f_kv').value=d?.kv_type||'f16';$('f_gpu').value=d?.gpu_mem_util??0.90;
  $('f_extra').value=(d?.extra_args||[]).join('\n');
  $('f_env').value=(d?.env||[]).join('\n');$('f_mounts').value=(d?.mounts||[]).join('\n');$('f_entry').checked=d?.use_image_entrypoint||false;
  $('f_auto').checked=d?.autostart||false;$('editOverlay').classList.add('show');}
$('addBtn').onclick=()=>openEdit(null);$('editCancel').onclick=()=>$('editOverlay').classList.remove('show');
$('editSave').onclick=async()=>{const extra=$('f_extra').value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const body={name:$('f_name').value.trim(),description:$('f_desc').value.trim(),engine:curEngine,model_path:$('f_path').value.trim(),
    image:$('f_image').value.trim(),host_port:parseInt($('f_port').value)||18080,context:parseInt($('f_ctx').value)||8192,
    ngl:parseInt($('f_ngl').value)||99,threads:parseInt($('f_threads').value)||20,kv_type:$('f_kv').value,
    gpu_mem_util:parseFloat($('f_gpu').value)||0.90,extra_args:extra,
    env:$('f_env').value.split(/\n+/).map(s=>s.trim()).filter(Boolean),
    mounts:$('f_mounts').value.split(/\n+/).map(s=>s.trim()).filter(Boolean),
    use_image_entrypoint:$('f_entry').checked,
    autostart:$('f_auto').checked};
  if(!body.name||!body.model_path){toast('Name and model path required','err');return;}
  if(curEngine==='llamacpp'&&!body.image){toast('llama.cpp needs an image','err');return;}
  try{await api('/api/models',{method:'POST',body});$('editOverlay').classList.remove('show');toast('Saved');refresh();}catch(e){toast('Save failed','err');}};
let confirmAction=null;
function confirmDialog(t,h,ok,a){$('confirmTitle').textContent=t;$('confirmMsg').innerHTML=h;$('confirmOk').textContent=ok||'Confirm';confirmAction=a;$('confirmOverlay').classList.add('show');}
$('confirmCancel').onclick=()=>$('confirmOverlay').classList.remove('show');
$('confirmOk').onclick=async()=>{$('confirmOverlay').classList.remove('show');if(confirmAction)await confirmAction();};
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show');}));
if(location.hostname)$('host').textContent=location.hostname;
if(!TOKEN)showToken();refresh();setInterval(refresh,2500);
</script>
