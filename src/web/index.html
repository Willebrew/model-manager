<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Model Manager</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --border: #2a3240;
    --text: #e6edf3; --muted: #8b98a9; --accent: #4c8dff; --accent2: #6f7bff;
    --ok: #3fb950; --warn: #d29922; --danger: #f85149; --chip: #21262d;
    --shadow: 0 6px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#f4f6fa; --panel:#ffffff; --panel2:#f0f3f8; --border:#dbe1ea;
      --text:#141a22; --muted:#5a6675; --chip:#eef1f6; --shadow:0 6px 24px rgba(20,30,50,.10);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 5; background: var(--panel);
    border-bottom: 1px solid var(--border); padding: 14px 20px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .brand { font-weight: 700; font-size: 17px; display: flex; align-items: center; gap: 9px; }
  .brand .logo { width: 22px; height: 22px; border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); display:inline-block; }
  .grow { flex: 1; }
  .memwrap { min-width: 320px; flex: 1; max-width: 560px; }
  .membar { height: 22px; border-radius: 6px; background: var(--chip); overflow: hidden;
    position: relative; border: 1px solid var(--border); }
  .memfill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%;
    transition: width .5s ease; }
  .memfill.hot { background: linear-gradient(90deg, var(--warn), var(--danger)); }
  .memlabel { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,.4); }
  .sub { color: var(--muted); font-size: 12px; margin-top: 3px; display:flex; gap:14px; flex-wrap:wrap;}
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot.ok { background: var(--ok); } .dot.bad { background: var(--danger); }
  .dot.warn { background: var(--warn); }
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--panel2);
    color: var(--text); padding: 7px 13px; border-radius: 8px; transition: .15s;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.primary:hover { filter: brightness(1.08); }
  button.danger { color: var(--danger); }
  button.danger:hover { border-color: var(--danger); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  main { max-width: 1100px; margin: 0 auto; padding: 22px 20px 60px; }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .toolbar h2 { margin: 0; font-size: 15px; color: var(--muted); font-weight: 600; letter-spacing:.3px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
    box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 12px;
  }
  .card.running { border-color: color-mix(in srgb, var(--ok) 45%, var(--border)); }
  .card h3 { margin: 0; font-size: 16px; display: flex; align-items: center; gap: 8px; word-break: break-word;}
  .desc { color: var(--muted); font-size: 13px; margin-top: -4px; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; letter-spacing:.3px; }
  .b-run { background: color-mix(in srgb, var(--ok) 22%, transparent); color: var(--ok); }
  .b-load { background: color-mix(in srgb, var(--warn) 22%, transparent); color: var(--warn); }
  .b-stop { background: var(--chip); color: var(--muted); }
  .b-oom { background: color-mix(in srgb, var(--danger) 20%, transparent); color: var(--danger); }
  .meta { display: grid; grid-template-columns: auto 1fr; gap: 5px 12px; font-size: 13px; }
  .meta .k { color: var(--muted); }
  .membox { background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .membox .top { display: flex; justify-content: space-between; align-items: baseline; }
  .membox .big { font-size: 20px; font-weight: 700; }
  .membox .brk { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 5px; background: var(--chip); color: var(--muted); }
  .tag.measured { color: var(--ok); background: color-mix(in srgb, var(--ok) 16%, transparent); }
  .oomnote { font-size: 12px; color: var(--danger); display: flex; gap: 6px; align-items: center; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; align-items: center; }
  .switch { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); margin-left: auto; }
  .switch input { width: 34px; height: 19px; appearance: none; background: var(--chip); border-radius: 999px;
    position: relative; cursor: pointer; border: 1px solid var(--border); transition: .2s; }
  .switch input:checked { background: var(--accent); border-color: var(--accent); }
  .switch input::after { content:""; position:absolute; width:15px; height:15px; border-radius:50%;
    background:#fff; top:1px; left:1px; transition:.2s; }
  .switch input:checked::after { left: 16px; }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none;
    align-items: center; justify-content: center; z-index: 20; padding: 16px; }
  .overlay.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    width: 100%; max-width: 560px; max-height: 90vh; overflow: auto; box-shadow: var(--shadow); }
  .modal h3 { margin: 0; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .modal .body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  .modal .foot { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  label { font-size: 13px; color: var(--muted); display: flex; flex-direction: column; gap: 5px; }
  input[type=text], input[type=number], textarea, select {
    font: inherit; background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; width: 100%; }
  textarea { resize: vertical; min-height: 60px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .hint { font-size: 11px; color: var(--muted); }
  pre.logs { background: #000; color: #b9f; padding: 12px; border-radius: 8px; max-height: 55vh;
    overflow: auto; font-size: 12px; white-space: pre-wrap; }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border); padding: 12px 18px; border-radius: 10px;
    box-shadow: var(--shadow); display: none; z-index: 40; max-width: 90vw; }
  #toast.err { border-color: var(--danger); color: var(--danger); }
  #toast.ok { border-color: var(--ok); }
  a { color: var(--accent); }
</style>

<header>
  <div class="brand"><span class="logo"></span> Model Manager</div>
  <div class="memwrap">
    <div class="membar"><div class="memfill" id="memfill"></div>
      <div class="memlabel" id="memlabel">—</div></div>
    <div class="sub" id="memsub"></div>
  </div>
  <div class="grow"></div>
  <button id="addBtn" class="primary">+ Add model</button>
  <button id="logoutBtn" title="Forget token">⎋</button>
</header>

<main>
  <div class="toolbar"><h2>MODELS</h2></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    No models registered yet. Click <b>+ Add model</b> to point at a GGUF and its llama.cpp image.
  </div>
</main>

<!-- Add/Edit modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3 id="editTitle">Add model</h3>
    <div class="body">
      <label>Name (also the OpenAI model id clients use)
        <input type="text" id="f_name" placeholder="MiniMax-M2.7-UD-IQ4_XS"></label>
      <label>Description <input type="text" id="f_desc" placeholder="optional"></label>
      <label>GGUF path (first shard, on this machine)
        <input type="text" id="f_gguf" placeholder="/home/you/models/.../model-00001-of-00004.gguf"></label>
      <label>Docker image (provides llama-server)
        <input type="text" id="f_image" placeholder="minimax-m27-longctx-108k"></label>
      <div class="row2">
        <label>Host port <input type="number" id="f_port" value="18080"></label>
        <label>Context (tokens) <input type="number" id="f_ctx" value="8192"></label>
      </div>
      <div class="row2">
        <label>GPU layers (ngl) <input type="number" id="f_ngl" value="99"></label>
        <label>Threads <input type="number" id="f_threads" value="20"></label>
      </div>
      <label>KV cache type
        <select id="f_kv">
          <option>f16</option><option>bf16</option><option>q8_0</option>
          <option>q5_1</option><option>q5_0</option><option>q4_1</option><option>q4_0</option><option>f32</option>
        </select></label>
      <label>Extra llama-server flags (one token per line)
        <textarea id="f_extra" placeholder="--jinja&#10;-fa&#10;on&#10;--no-warmup"></textarea>
        <span class="hint">Each whitespace-separated token on its own line, e.g. <code>--spec-type</code> then <code>ngram-simple</code>.</span>
      </label>
      <label class="switch" style="margin:0">
        <input type="checkbox" id="f_auto"> Start automatically on boot
      </label>
    </div>
    <div class="foot">
      <button id="editCancel">Cancel</button>
      <button class="primary" id="editSave">Save</button>
    </div>
  </div>
</div>

<!-- Confirm/OOM modal -->
<div class="overlay" id="confirmOverlay">
  <div class="modal">
    <h3 id="confirmTitle">Confirm</h3>
    <div class="body"><div id="confirmMsg"></div></div>
    <div class="foot">
      <button id="confirmCancel">Cancel</button>
      <button class="primary" id="confirmOk">Confirm</button>
    </div>
  </div>
</div>

<!-- Token gate -->
<div class="overlay" id="tokenOverlay">
  <div class="modal" style="max-width:440px">
    <h3>Access token</h3>
    <div class="body">
      <p style="margin:0;color:var(--muted)">This dashboard controls model processes on this machine. Enter the access token printed in the server's terminal.</p>
      <label>Token <input type="text" id="tokenInput" placeholder="paste token"></label>
    </div>
    <div class="foot"><button class="primary" id="tokenSave">Connect</button></div>
  </div>
</div>

<!-- Logs modal -->
<div class="overlay" id="logsOverlay">
  <div class="modal" style="max-width:820px">
    <h3 id="logsTitle">Logs</h3>
    <div class="body"><pre class="logs" id="logsBody">loading…</pre></div>
    <div class="foot"><button id="logsClose">Close</button></div>
  </div>
</div>

<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
let TOKEN = localStorage.getItem('mm_token') || (new URLSearchParams(location.search).get('token') || '');
if (TOKEN) localStorage.setItem('mm_token', TOKEN);
let editing = null; // name when editing an existing model

function toast(msg, kind) {
  const t = $('toast'); t.textContent = msg; t.className = kind || '';
  t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', 4200);
}
function fmtGiB(mib) { return (mib/1024).toFixed(1) + ' GB'; }

async function api(path, opts={}) {
  opts.headers = Object.assign({'Authorization': 'Bearer ' + TOKEN}, opts.headers||{});
  if (opts.body && typeof opts.body !== 'string') {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const r = await fetch(path, opts);
  let data = null; try { data = await r.json(); } catch(e){}
  if (r.status === 401) { showToken(); throw {status:401, data}; }
  if (!r.ok) throw {status:r.status, data};
  return data;
}

function showToken() { $('tokenOverlay').classList.add('show'); }
$('tokenSave').onclick = () => {
  TOKEN = $('tokenInput').value.trim();
  localStorage.setItem('mm_token', TOKEN);
  $('tokenOverlay').classList.remove('show');
  refresh();
};
$('logoutBtn').onclick = () => { localStorage.removeItem('mm_token'); TOKEN=''; showToken(); };

// ---- render ----
function statusBadge(m) {
  if (m.running && m.healthy) return '<span class="badge b-run">RUNNING</span>';
  if (m.running && !m.healthy) return '<span class="badge b-load">LOADING…</span>';
  if (m.oom.would_oom) return '<span class="badge b-oom">OOM RISK</span>';
  return '<span class="badge b-stop">STOPPED</span>';
}

function card(m) {
  const d = m.def;
  const est = m.estimate;
  const memTag = est.measured ? '<span class="tag measured">measured</span>' : '<span class="tag">estimated</span>';
  const brk = est.measured
    ? `weights ${fmtGiB(est.weights_mib)} · kv ${fmtGiB(est.kv_mib)} (est)`
    : `weights ${fmtGiB(est.weights_mib)} · kv ${fmtGiB(est.kv_mib)} · overhead ${fmtGiB(est.overhead_mib)}`;
  const oomLine = (!m.running && m.oom.would_oom)
    ? `<div class="oomnote">⚠ Would exceed memory by ${fmtGiB(-m.oom.headroom_mib)} — loading is likely to OOM.</div>`
    : (!m.running ? `<div class="hint">Headroom after load: ${fmtGiB(m.oom.headroom_mib)}</div>` : '');

  const el = document.createElement('div');
  el.className = 'card' + (m.running ? ' running' : '');
  el.innerHTML = `
    <h3>${esc(d.name)} ${statusBadge(m)}</h3>
    ${d.description ? `<div class="desc">${esc(d.description)}</div>` : ''}
    <div class="membox">
      <div class="top"><span class="big">${fmtGiB(est.total_mib)}</span> ${memTag}</div>
      <div class="brk">${brk}</div>
      ${oomLine}
    </div>
    <div class="meta">
      <span class="k">Port</span><span>:${d.host_port} ${m.healthy?'· <a href="http://'+location.hostname+':'+d.host_port+'/v1/models" target="_blank">API</a>':''}</span>
      <span class="k">Context</span><span>${d.context.toLocaleString()} tokens · KV ${esc(d.kv_type)}</span>
      <span class="k">Image</span><span>${esc(d.image)}</span>
    </div>
    <div class="actions">
      ${m.running
        ? `<button class="danger" data-act="unload">Unload</button>`
        : `<button class="primary" data-act="load">Load</button>`}
      <button data-act="logs">Logs</button>
      <button data-act="edit">Edit</button>
      <button class="danger" data-act="del">Delete</button>
      <label class="switch" title="Start on boot">
        <input type="checkbox" data-act="auto" ${d.autostart?'checked':''}> boot
      </label>
    </div>`;
  el.querySelector('[data-act=load]')?.addEventListener('click', ()=>loadModel(m));
  el.querySelector('[data-act=unload]')?.addEventListener('click', ()=>unloadModel(d.name));
  el.querySelector('[data-act=logs]').addEventListener('click', ()=>showLogs(d.name));
  el.querySelector('[data-act=edit]').addEventListener('click', ()=>openEdit(d));
  el.querySelector('[data-act=del]').addEventListener('click', ()=>delModel(d.name));
  el.querySelector('[data-act=auto]').addEventListener('change', (e)=>setAuto(d.name, e.target.checked));
  return el;
}
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function refresh() {
  if (!TOKEN) { showToken(); return; }
  let st;
  try { st = await api('/api/state'); }
  catch(e){ if(e.status!==401) toast('Connection lost — retrying…','err'); return; }

  const mem = st.memory;
  const pct = Math.min(100, Math.round(mem.used_mib*100/mem.total_mib));
  const fill = $('memfill'); fill.style.width = pct+'%';
  fill.classList.toggle('hot', pct >= 85);
  $('memlabel').textContent = `RAM ${fmtGiB(mem.used_mib)} / ${fmtGiB(mem.total_mib)} (${pct}%)`;
  $('memsub').innerHTML =
    `<span>${fmtGiB(mem.available_mib)} available</span>` +
    `<span>swap ${fmtGiB(mem.swap_used_mib)} / ${fmtGiB(mem.swap_total_mib)}</span>` +
    `<span><span class="dot ${st.docker_ok?'ok':'bad'}"></span>Docker ${st.docker_ok?'connected':'unreachable'}</span>`;

  const grid = $('grid'); grid.innerHTML='';
  st.models.forEach(m => grid.appendChild(card(m)));
  $('empty').style.display = st.models.length ? 'none' : 'block';
}

// ---- actions ----
async function loadModel(m) {
  if (m.oom.would_oom) {
    confirmDialog(
      'Memory warning',
      `<p><b>${esc(m.def.name)}</b> needs about <b>${fmtGiB(m.oom.needed_mib)}</b>, but only
       <b>${fmtGiB(m.oom.available_mib)}</b> is available right now.</p>
       <p style="color:var(--danger)">Loading it will very likely run out of memory and crash. Free memory (unload another model) or load anyway at your own risk.</p>`,
      'Load anyway',
      async () => doLoad(m.def.name, true)
    );
  } else {
    doLoad(m.def.name, false);
  }
}
async function doLoad(name, force) {
  try {
    toast('Starting '+name+'… (large models take several minutes)', 'ok');
    await api(`/api/models/${encodeURIComponent(name)}/load?force=${force}`, {method:'POST'});
    setTimeout(refresh, 800);
  } catch(e) {
    if (e.status===409 && e.data) {
      // Server-side OOM refusal (race): offer force.
      confirmDialog('Memory warning', `<p>${esc(e.data.message||'Would OOM')}</p>`, 'Load anyway',
        ()=>doLoad(name, true));
    } else toast('Load failed: '+(e.data?.error||e.status), 'err');
  }
}
async function unloadModel(name) {
  confirmDialog('Unload model', `<p>Stop and remove the container for <b>${esc(name)}</b>?</p>`, 'Unload', async ()=>{
    try { await api(`/api/models/${encodeURIComponent(name)}/unload`, {method:'POST'}); toast(name+' unloaded','ok'); refresh(); }
    catch(e){ toast('Unload failed: '+(e.data?.error||e.status),'err'); }
  });
}
async function setAuto(name, enabled) {
  try { await api(`/api/models/${encodeURIComponent(name)}/autostart`, {method:'POST', body:{enabled}});
    toast(`Boot autostart ${enabled?'enabled':'disabled'} for ${name}`,'ok'); refresh(); }
  catch(e){ toast('Failed: '+(e.data?.error||e.status),'err'); refresh(); }
}
async function delModel(name) {
  confirmDialog('Delete model', `<p>Remove <b>${esc(name)}</b> from Model Manager? (Unloads it if running; the GGUF files are not deleted.)</p>`,
    'Delete', async ()=>{
    try { await api(`/api/models/${encodeURIComponent(name)}`, {method:'DELETE'}); toast(name+' removed','ok'); refresh(); }
    catch(e){ toast('Delete failed: '+(e.data?.error||e.status),'err'); }
  });
}
async function showLogs(name) {
  $('logsTitle').textContent = 'Logs · '+name;
  $('logsBody').textContent = 'loading…';
  $('logsOverlay').classList.add('show');
  try { const d = await api(`/api/models/${encodeURIComponent(name)}/logs`); $('logsBody').textContent = d.logs || '(no logs)'; }
  catch(e){ $('logsBody').textContent = 'Error: '+(e.data?.error||e.status); }
}
$('logsClose').onclick = ()=> $('logsOverlay').classList.remove('show');

// ---- edit modal ----
function openEdit(d) {
  editing = d ? d.name : null;
  $('editTitle').textContent = d ? 'Edit model' : 'Add model';
  $('f_name').value = d?.name || '';
  $('f_name').disabled = !!d;
  $('f_desc').value = d?.description || '';
  $('f_gguf').value = d?.gguf_path || '';
  $('f_image').value = d?.image || '';
  $('f_port').value = d?.host_port ?? 18080;
  $('f_ctx').value = d?.context ?? 8192;
  $('f_ngl').value = d?.ngl ?? 99;
  $('f_threads').value = d?.threads ?? 20;
  $('f_kv').value = d?.kv_type || 'f16';
  $('f_extra').value = (d?.extra_args || []).join('\n');
  $('f_auto').checked = d?.autostart || false;
  $('editOverlay').classList.add('show');
}
$('addBtn').onclick = ()=> openEdit(null);
$('editCancel').onclick = ()=> $('editOverlay').classList.remove('show');
$('editSave').onclick = async ()=> {
  const extra = $('f_extra').value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const body = {
    name: $('f_name').value.trim(),
    description: $('f_desc').value.trim(),
    gguf_path: $('f_gguf').value.trim(),
    image: $('f_image').value.trim(),
    host_port: parseInt($('f_port').value)||18080,
    context: parseInt($('f_ctx').value)||8192,
    ngl: parseInt($('f_ngl').value)||99,
    threads: parseInt($('f_threads').value)||20,
    kv_type: $('f_kv').value,
    extra_args: extra,
    autostart: $('f_auto').checked,
  };
  if (!body.name || !body.gguf_path || !body.image) { toast('Name, GGUF path and image are required','err'); return; }
  try { await api('/api/models', {method:'POST', body}); $('editOverlay').classList.remove('show'); toast('Saved','ok'); refresh(); }
  catch(e){ toast('Save failed: '+(e.data?.error||e.status),'err'); }
};

// ---- confirm modal ----
let confirmAction = null;
function confirmDialog(title, html, okLabel, action) {
  $('confirmTitle').textContent = title;
  $('confirmMsg').innerHTML = html;
  $('confirmOk').textContent = okLabel || 'Confirm';
  confirmAction = action;
  $('confirmOverlay').classList.add('show');
}
$('confirmCancel').onclick = ()=> $('confirmOverlay').classList.remove('show');
$('confirmOk').onclick = async ()=> { $('confirmOverlay').classList.remove('show'); if (confirmAction) await confirmAction(); };

// ---- boot ----
if (!TOKEN) showToken();
refresh();
setInterval(refresh, 2500);
</script>
